<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Ayushi & Rohit's Map</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="css/map.css">
</head>
<body>
  <div id="map"></div>

  <!-- Search -->
  <div class="search-container">
    <div class="search-bar">
      <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <circle cx="11" cy="11" r="7"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="search-input" placeholder="Where to?" autocomplete="off" spellcheck="false">
      <button id="search-clear" class="search-clear" style="display:none">&times;</button>
    </div>
    <ul id="search-results" class="search-results"></ul>
  </div>

  <!-- Save / Edit modal -->
  <div id="save-overlay" class="modal-overlay" style="display:none">
    <div class="save-modal">
      <div class="modal-header">
        <h3 id="modal-title">Save Place</h3>
        <button id="modal-close" class="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="modal-place-info">
          <input type="text" id="save-name" class="modal-place-name" readonly>
          <p id="save-address" class="modal-place-addr"></p>
        </div>

        <div class="items-section">
          <div class="items-section-header">
            <span class="items-section-title">Tasting Notes</span>
            <button id="add-item-btn" class="add-item-btn" type="button">+ Add</button>
          </div>
          <div id="items-container"></div>
          <p id="items-empty" class="items-empty">What did you try here?</p>
        </div>

        <button id="save-btn" class="save-btn">Save Place</button>
      </div>
    </div>
  </div>

  <!-- Saved places drawer -->
  <button id="drawer-toggle" class="drawer-toggle" aria-label="Saved places">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
      <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
    </svg>
    <span id="drawer-count" class="drawer-count">0</span>
  </button>

  <div id="drawer" class="drawer" style="display:none">
    <div class="drawer-header">
      <h3>Saved Places</h3>
      <button id="drawer-close" class="drawer-close">&times;</button>
    </div>
    <ul id="saved-list" class="saved-list"></ul>
    <div id="saved-empty" class="saved-empty">
      <p>Nothing saved yet</p>
      <span>Search for a place to get started</span>
    </div>
  </div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="module" src="js/map-app.js"></script>
</body>
</html>
